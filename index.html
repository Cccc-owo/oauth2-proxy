<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 Proxy</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f3ee;
        --text: #111111;
        --muted: #6b6b6b;
        --line: #d9d2c7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 0, 0, 0.04), transparent 35%),
          var(--bg);
        color: var(--text);
        font-family: "Georgia", "Times New Roman", serif;
      }

      main {
        width: min(420px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(32px, 8vw, 56px);
        font-weight: 500;
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 14px;
      }

      nav {
        display: flex;
        gap: 18px;
      }

      a {
        color: var(--text);
        text-decoration: none;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--line);
      }

      a:hover {
        border-bottom-color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OAuth2 Proxy</h1>
      <p>Minimal OAuth2 proxy API.</p>
      <nav>
        <a href="https://github.com/Cccc-owo/oauth2-proxy">GitHub</a>
        <a href="/docs">Docs</a>
      </nav>
    </main>
  </body>
</html>
